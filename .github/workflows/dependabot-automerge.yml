name: Dependabot Auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@5e5f99653a5b510e8555840e80cbf1514ad4af38 # v2.1.0 (pinned for security)
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch and minor updates
        # Only merge non-breaking updates: patch and minor versions
        # Skip major updates which may contain breaking changes
        if: |
          (steps.meta.outputs.update-type == 'version-update:semver-patch' ||
           steps.meta.outputs.update-type == 'version-update:semver-minor') &&
          steps.meta.outputs.dependency-type == 'direct:production'
        run: |
          echo "Auto-merging ${{ steps.meta.outputs.dependency-name }} (${{ steps.meta.outputs.new-version }})"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Require manual review for major updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "⚠️ Major version update detected: ${{ steps.meta.outputs.dependency-name }}"
          echo "Please review and test manually before merging."
